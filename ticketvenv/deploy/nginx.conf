# Конфиг Nginx для HelpDesk IT (Этап 1 + Этап 2 HTTPS).
# Кладётся в /etc/nginx/sites-available/ticket и линкуется в sites-enabled.

# редирект всего http на https
server {
    listen 80;
    server_name your-domain.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.ru;

    # самоподписанный сертификат (Этап 2):
    # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout /etc/ssl/private/ticket.key -out /etc/ssl/certs/ticket.crt
    ssl_certificate     /etc/ssl/certs/ticket.crt;
    ssl_certificate_key /etc/ssl/private/ticket.key;

    # отдаём статику напрямую, минуя Django
    location /static/ {
        alias /home/ticket/django-ticket-management-system/ticketvenv/static/;
    }

    # проксируем остальные запросы на gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
